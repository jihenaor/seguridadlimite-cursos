# ══════════════════════════════════════════════════════════════
#  CI/CD — Backend Spring Boot (Seguridad Al Límite)
#  Monorepo: se dispara solo cuando cambia back/
#
#  Flujo:
#    1. Compilar con Maven (Java 21), saltar tests
#    2. Construir imagen Docker
#    3. Publicar en GitHub Container Registry (ghcr.io)
#    4. SSH al VPS → pull + restart del contenedor
#
#  GitHub Secrets requeridos:
#    GHCR_TOKEN         → PAT con permisos write:packages
#    SERVER_HOST        → IP o dominio del VPS
#    SERVER_USER        → Usuario SSH (ej: ubuntu)
#    SERVER_SSH_KEY     → Clave privada SSH (contenido id_rsa)
#    SERVER_DEPLOY_PATH → Ruta al docker-compose en el VPS (ej: /home/ubuntu/app)
# ══════════════════════════════════════════════════════════════

name: Backend CI/CD

on:
  workflow_dispatch:  # permite ejecución manual desde GitHub Actions
  push:
    branches: [main]
    paths:
      - 'back/**'
      - '.github/workflows/ci-cd-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'back/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/seguridad-backend

jobs:

  # ────────────────────────────────────────────
  #  JOB 1: Compilar con Maven
  # ────────────────────────────────────────────
  build:
    name: Build Maven
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar (sin tests)
        working-directory: back
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Guardar JAR (solo push a main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: back/target/seguridadallimite-1.0.jar
          retention-days: 1

  # ────────────────────────────────────────────
  #  JOB 2: Docker Build & Push a GHCR
  # ────────────────────────────────────────────
  docker-publish:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Metadatos de imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y publicar imagen
        uses: docker/build-push-action@v5
        with:
          context: ./back
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────
  #  JOB 3: Deploy al VPS vía SSH
  # ────────────────────────────────────────────
  deploy:
    name: Deploy al VPS
    runs-on: ubuntu-latest
    needs: docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.SERVER_DEPLOY_PATH }}

            echo "🔐 Login en GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u jihenaor --password-stdin

            echo "📦 Pulling nueva imagen del backend..."
            docker compose pull backend

            echo "🔄 Reiniciando contenedor backend..."
            docker compose up -d --no-deps backend

            echo "🧹 Limpiando imágenes antiguas..."
            docker image prune -f

            echo "✅ Deploy backend completado."
            docker compose ps backend
