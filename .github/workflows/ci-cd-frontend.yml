# ══════════════════════════════════════════════════════════════
#  CI/CD — Frontend Angular (Seguridad Al Límite)
#  Monorepo: se dispara solo cuando cambia front/
#
#  Flujo:
#    1. Build Angular producción
#    2. Construir imagen Docker (Nginx + artefactos)
#    3. Publicar en GitHub Container Registry (ghcr.io)
#    4. SSH al VPS → pull + restart del contenedor
#
#  Deploy: sincroniza en el VPS docker-compose.yml y nginx/gateway.conf (git pull en SERVER_DEPLOY_PATH).
#  El servicio API legacy se llama «api-legacy» (antes «seguridad_api») para DNS compatible con nginx reload.
#
#  GitHub Secrets requeridos:
#    GHCR_TOKEN         → PAT con permisos write:packages
#    SERVER_HOST        → IP o dominio del VPS
#    SERVER_USER        → Usuario SSH (ej: ubuntu)
#    SERVER_SSH_KEY     → Clave privada SSH (contenido id_rsa)
#    SERVER_DEPLOY_PATH → Ruta al docker-compose en el VPS (ej: /home/ubuntu/app)
# ══════════════════════════════════════════════════════════════

name: Frontend CI/CD

on:
  workflow_dispatch:  # permite ejecución manual desde GitHub Actions
  push:
    branches: [main]
    paths:
      - 'front/**'
      - '.github/workflows/ci-cd-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'front/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/seguridad-frontend

jobs:

  # ────────────────────────────────────────────
  #  JOB 1: Build Angular
  # ────────────────────────────────────────────
  build:
    name: Build Angular
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Instalar dependencias
        working-directory: front
        run: npm ci --legacy-peer-deps

      - name: Build producción
        working-directory: front
        run: npm run build

      - name: Guardar artefacto (solo push a main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: front/dist/
          retention-days: 1

  # ────────────────────────────────────────────
  #  JOB 2: Docker Build & Push a GHCR
  # ────────────────────────────────────────────
  docker-publish:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Metadatos de imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y publicar imagen
        uses: docker/build-push-action@v5
        with:
          context: ./front
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────
  #  JOB 3: Deploy al VPS vía SSH
  # ────────────────────────────────────────────
  deploy:
    name: Deploy al VPS
    runs-on: ubuntu-latest
    needs: docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy vía SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 15m
          script: |
            set -e
            cd ${{ secrets.SERVER_DEPLOY_PATH }}

            echo "📥 Sincronizar definición del stack (compose + nginx) desde git..."
            if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
              git pull --ff-only || echo "⚠️ git pull falló; se usa el compose ya en el servidor."
            else
              echo "⚠️ SERVER_DEPLOY_PATH no es un repo git; el compose debe incluir los servicios esperados."
            fi

            echo "🔐 Login en GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u jihenaor --password-stdin

            echo "📦 Pulling nueva imagen del frontend..."
            docker compose pull frontend

            UP_SERVICES="frontend gateway"
            if docker compose config --services 2>/dev/null | grep -qx 'api-legacy'; then
              UP_SERVICES="frontend api-legacy gateway"
            else
              echo "⚠️ Este compose no define «api-legacy» (compose antiguo). Levantando solo frontend y gateway."
            fi
            echo "🔄 Levantando: $UP_SERVICES (misma red Docker cuando api-legacy existe; evita host not found en nginx reload)..."
            docker compose up -d $UP_SERVICES

            echo "🧪 Validar nginx y recargar (api-legacy = servicio compose; antes seguridad_api)..."
            docker compose exec -T gateway nginx -t
            docker compose exec -T gateway nginx -s reload

            echo "🧹 Limpiando imágenes antiguas..."
            docker image prune -f

            echo "✅ Deploy frontend completado."
            docker compose ps frontend gateway
