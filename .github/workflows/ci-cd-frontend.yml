# ══════════════════════════════════════════════════════════════
#  CI/CD — Frontend Angular (Seguridad Al Límite)
#  Monorepo: se dispara solo cuando cambia front/
#
#  Flujo:
#    1. Build Angular producción
#    2. Construir imagen Docker (Nginx + artefactos)
#    3. Publicar en GitHub Container Registry (ghcr.io)
#    4. SSH al VPS → pull + restart del contenedor
#
#  Deploy: envía compose.yml, infraestructura/docker-compose.yml y nginx/gateway.conf (tar+ssh) y alinea git al SHA del run
#  (git reset --hard; evita fallos por «local changes would be overwritten» tras el tar o ediciones en el VPS).
#  En el servidor: export COMPOSE_FILE=compose.yml y se renombra un docker-compose.yml duplicado en la raíz (evita warning de Compose).
#  Si el job termina en 137 (SIGKILL), suele ser OOM del VPS al recrear varios contenedores; subir RAM/swap o revisar límites Docker.
#  El servicio API legacy se llama «api-legacy» (alias Docker «seguridad_api») para DNS compatible con nginx reload.
#
#  GitHub Secrets requeridos:
#    GHCR_TOKEN         → PAT con permisos write:packages
#    SERVER_HOST        → IP o dominio del VPS
#    SERVER_USER        → Usuario SSH (ej: ubuntu)
#    SERVER_SSH_KEY     → Clave privada SSH (contenido id_rsa)
#    SERVER_DEPLOY_PATH → Raíz del monorepo en el VPS (donde están compose.yml e infraestructura/; ej: /home/ubuntu/seguridad)
# ══════════════════════════════════════════════════════════════

name: Frontend CI/CD

on:
  workflow_dispatch:  # permite ejecución manual desde GitHub Actions
  push:
    branches: [main]
    paths:
      - 'front/**'
      - '.github/workflows/ci-cd-frontend.yml'
      - 'compose.yml'
      - 'infraestructura/docker-compose.yml'
      - 'infraestructura/nginx/**'
  pull_request:
    branches: [main]
    paths:
      - 'front/**'
      - 'compose.yml'
      - 'infraestructura/docker-compose.yml'
      - 'infraestructura/nginx/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/seguridad-frontend

jobs:

  # ────────────────────────────────────────────
  #  JOB 1: Build Angular
  # ────────────────────────────────────────────
  build:
    name: Build Angular
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Instalar dependencias
        working-directory: front
        run: npm ci --legacy-peer-deps

      - name: Build producción
        working-directory: front
        run: npm run build

      - name: Guardar artefacto (solo push a main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: front/dist/
          retention-days: 1

  # ────────────────────────────────────────────
  #  JOB 2: Docker Build & Push a GHCR
  # ────────────────────────────────────────────
  docker-publish:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Metadatos de imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y publicar imagen
        uses: docker/build-push-action@v5
        with:
          context: ./front
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────
  #  JOB 3: Deploy al VPS vía SSH
  # ────────────────────────────────────────────
  deploy:
    name: Deploy al VPS
    runs-on: ubuntu-latest
    needs: docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout (infra exacta del commit que despliega)
        uses: actions/checkout@v4

      - name: Enviar compose y nginx/gateway.conf al VPS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.SERVER_DEPLOY_PATH }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          tar czf - compose.yml infraestructura/docker-compose.yml infraestructura/nginx/gateway.conf | \
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p 22 \
              "${SERVER_USER}@${SERVER_HOST}" \
              "set -euo pipefail; cd \"${DEPLOY_PATH}\" && tar xzf -"
          echo "✅ Archivos de infra sincronizados en el VPS (compose + gateway.conf)."

      - name: Deploy vía SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 15m
          script: |
            set -e
            cd ${{ secrets.SERVER_DEPLOY_PATH }}
            export COMPOSE_FILE=compose.yml

            if [ -f compose.yml ] && [ -f docker-compose.yml ]; then
              echo "📎 Raíz con compose.yml y docker-compose.yml: renombrando el legado para que Compose no avise duplicado."
              mv -f docker-compose.yml docker-compose.yml.root-legacy.bak
            fi

            echo "📥 Alinear git al commit desplegado (${{ github.sha }}; descarta cambios locales en archivos versionados)..."
            if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
              git fetch origin
              git reset --hard "${{ github.sha }}"
            else
              echo "⚠️ SERVER_DEPLOY_PATH no es un repo git; se confía en el tar del job y el estado actual del disco."
            fi

            echo "🔐 Login en GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u jihenaor --password-stdin

            echo "📦 Pulling nueva imagen del frontend..."
            docker compose pull frontend

            UP_SERVICES="frontend gateway"
            if docker compose config --services 2>/dev/null | grep -qx 'api-legacy'; then
              UP_SERVICES="frontend api-legacy gateway"
            else
              echo "⚠️ Este compose no define «api-legacy». Levantando solo frontend y gateway."
            fi
            echo "🔄 Levantando: $UP_SERVICES (sin dejar huérfanos conocidos)..."
            docker compose up -d --remove-orphans $UP_SERVICES

            echo "⏳ Esperando a que gateway quede en running (nginx arrancado; máx. ~90s)..."
            gw_ok=0
            i=0
            max=45
            r_streak=0
            while [ "$i" -lt "$max" ]; do
              cid=$(docker compose ps -q gateway 2>/dev/null || true)
              if [ -z "$cid" ]; then
                echo "❌ No hay contenedor gateway."
                docker compose ps -a
                exit 1
              fi
              st=$(docker inspect -f '{{.State.Status}}' "$cid" 2>/dev/null || echo unknown)
              if [ "$st" = "running" ]; then
                r_streak=0
                # Evita carrera: nginx puede fallar al poco y el contenedor pasa a restarting justo antes de nginx -t.
                st2=""; st3=""
                echo "⏳ Gateway running; comprobando que se mantenga estable unos segundos..."
                sleep 5
                cid=$(docker compose ps -q gateway 2>/dev/null || true)
                st2=$(docker inspect -f '{{.State.Status}}' "$cid" 2>/dev/null || echo unknown)
                if [ "$st2" = "running" ]; then
                  sleep 4
                  cid=$(docker compose ps -q gateway 2>/dev/null || true)
                  st3=$(docker inspect -f '{{.State.Status}}' "$cid" 2>/dev/null || echo unknown)
                  if [ "$st3" = "running" ]; then
                    gw_ok=1
                    echo "✅ Gateway estable en running."
                    break
                  fi
                fi
                echo "⏳ Gateway inestable (running → ${st2:-?} / ${st3:-n/a}); sigo esperando..."
              fi
              if [ "$st" = "exited" ] || [ "$st" = "dead" ]; then
                echo "❌ Gateway detenido (estado: $st). Revisa certificados/montajes y default.conf."
                docker compose logs --tail=120 gateway
                exit 1
              fi
              if [ "$st" = "restarting" ]; then
                r_streak=$((r_streak + 1))
                case "$r_streak" in 1|5|10|15)
                  echo "📋 Logs gateway (restarting consecutivo #${r_streak}):"
                  docker compose logs --tail=80 gateway 2>/dev/null || true
                  ;;
                esac
                if [ "$r_streak" -ge 20 ]; then
                  echo "❌ Gateway en bucle de reinicio (nginx emite [emerg] y Docker reinicia el contenedor). Revise gateway.conf, certificados y redes en el VPS."
                  docker compose logs --tail=200 gateway 2>/dev/null || true
                  exit 1
                fi
              else
                r_streak=0
              fi
              echo "⏳ gateway=$st ($((i+1))/${max})..."
              sleep 2
              i=$((i+1))
            done
            if [ "$gw_ok" != "1" ]; then
              echo "❌ Timeout: gateway sigue sin running (p. ej. reinicios por error de nginx). Estado:"
              cid=$(docker compose ps -q gateway 2>/dev/null || true)
              [ -n "$cid" ] && docker inspect -f '{{json .State}}' "$cid" || true
              docker compose logs --tail=120 gateway
              exit 1
            fi

            echo "🧪 Validar nginx y recargar (reintentos si el contenedor aún reinicia)..."
            nt_ok=0
            for n in $(seq 1 30); do
              cidg=$(docker compose ps -q gateway 2>/dev/null || true)
              stg=$(docker inspect -f '{{.State.Status}}' "$cidg" 2>/dev/null || echo unknown)
              if [ "$stg" = "running" ]; then
                if docker compose exec -T gateway nginx -t; then
                  nt_ok=1
                  break
                fi
                echo "⏳ nginx -t falló (intento ${n}/30); logs recientes:"
                docker compose logs --tail=25 gateway 2>/dev/null || true
              else
                echo "⏳ gateway=$stg (intento ${n}/30), esperando running..."
              fi
              sleep 2
            done
            if [ "$nt_ok" != "1" ]; then
              echo "❌ nginx -t no pudo ejecutarse con gateway estable."
              docker compose logs --tail=120 gateway
              exit 1
            fi
            docker compose exec -T gateway nginx -s reload

            echo "🧹 Limpiando imágenes antiguas..."
            docker image prune -f

            echo "✅ Deploy frontend completado."
            docker compose ps frontend gateway
