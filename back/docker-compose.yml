# MySQL + phpMyAdmin (http://127.0.0.1:8081)
#
# La API debe usar solo DB_USER / DB_PASSWORD (usuario de aplicación). Root es solo para admin.
# Copia back/.env.example → back/.env y ajusta contraseñas. Valores por defecto solo para dev local.
#
# Importante: MYSQL_USER / MYSQL_PASSWORD solo se aplican al crear el volumen vacío (primera vez).
# Si cambias DB_PASSWORD en .env y sigue el error 1045, ejecuta (ajusta el nombre del contenedor):
# Olvidaste root: scripts\reset-mysql-root-docker.ps1   (luego actualiza MYSQL_ROOT_PASSWORD en .env)
#   CMD Windows:  scripts\actualizar-usuario-mysql-docker.cmd sst-mysql
#   PowerShell:   pwsh -File scripts/actualizar-usuario-mysql-docker.ps1 -ContainerName sst-mysql
#   WSL:          bash scripts/actualizar-usuario-mysql-docker.sh sst-mysql   (chmod no necesario si usas: bash script.sh)
version: '3'

services:
  db:
    container_name: mysql8
    image: mysql:8.0
    command: mysqld --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-DevRootOnly_ChangeMe}
      MYSQL_DATABASE: ${DB_NAME:-wwsegu_cursos}
      MYSQL_USER: ${DB_USER:-seguridadlimite_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-DevAppDb_Local_ChangeMe}
    ports:
      - '3306:3306'
    volumes:
      - './docker/db/data:/var/lib/mysql'
      - './docker/db/sql:/docker-entrypoint-initdb.d'
    networks:
      - my_network

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: mysql8-phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: "0"
    ports:
      - "127.0.0.1:8081:80"
    networks:
      - my_network

networks:
  my_network:
    driver: bridge