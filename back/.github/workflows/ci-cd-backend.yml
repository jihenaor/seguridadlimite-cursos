# ══════════════════════════════════════════════════════════════
#  CI/CD — Microservicio Backend (Spring Boot)
#
#  Flujo:
#    1. Test + Build con Maven
#    2. Construir imagen Docker
#    3. Publicar en GitHub Container Registry (GHCR)
#    4. SSH al servidor → pull + restart del contenedor
#
#  Secrets requeridos en GitHub (Settings → Secrets):
#    GHCR_TOKEN         → Personal Access Token con permisos write:packages
#    SERVER_HOST        → IP o dominio del servidor VPS
#    SERVER_USER        → Usuario SSH del servidor (ej: ubuntu, deploy)
#    SERVER_SSH_KEY     → Clave privada SSH (contenido del archivo id_rsa)
#    SERVER_DEPLOY_PATH → Ruta al docker-compose en el servidor (ej: /home/ubuntu/app)
# ══════════════════════════════════════════════════════════════

name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - '.github/workflows/ci-cd-backend.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/seguridad-backend

jobs:

  # ──────────────────────────────────────────
  #  JOB 1: Test y Build
  # ──────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y ejecutar tests
        run: mvn clean verify --no-transfer-progress

      - name: Guardar artefacto JAR (solo en push a main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/seguridadallimite-1.0.jar
          retention-days: 1

  # ──────────────────────────────────────────
  #  JOB 2: Construir y publicar imagen Docker
  # ──────────────────────────────────────────
  docker-publish:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Metadatos de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y publicar imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  #  JOB 3: Deploy al servidor vía SSH
  # ──────────────────────────────────────────
  deploy:
    name: Deploy al Servidor
    runs-on: ubuntu-latest
    needs: docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Conectar y desplegar vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.SERVER_DEPLOY_PATH }}

            echo "🔐 Login en GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u jihenaor --password-stdin

            echo "📦 Pulling nueva imagen del backend..."
            docker compose pull backend

            echo "🔄 Reiniciando contenedor backend..."
            docker compose up -d --no-deps backend

            echo "🧹 Limpiando imágenes antiguas..."
            docker image prune -f

            echo "✅ Deploy del backend completado."
            docker compose ps backend
