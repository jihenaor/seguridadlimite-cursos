# ──────────────────────────────────────────────────────────────
#  Nginx — Microservicio Frontend (Angular SPA)
#  Este Nginx sirve los archivos estáticos del build de Angular.
#  La redirección de /api al backend la hace el API Gateway.
# ──────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Cache de assets con hash en el nombre (Angular los genera así)
    location ~* \.(js|css|woff2?|ttf|eot|otf|ico|svg|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Para Angular: cualquier ruta desconocida → index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Seguridad básica: ocultar versión de Nginx
    server_tokens off;
}
