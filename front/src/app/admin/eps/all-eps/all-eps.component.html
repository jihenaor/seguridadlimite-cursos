<section class="content">
  <div class="container-fluid">

    <app-pagetitle [title]="'Eps'"></app-pagetitle>

    <div class="card">
      <div class="body">
        <div class="table-responsive">
          <div class="materialTableHeader">
            <div class="row">
              <div class="col-8">
                <ul class="header-buttons-left ml-0">
                  <li class="dropdown m-l-20">
                    <label for="search-input"><i class="material-icons search-icon">search</i></label>
                    <input placeholder="Search" type="text" #filter class="browser-default search-field"
                      aria-label="Search box">
                  </li>

                </ul>
              </div>
              <div class="col-4">
                <ul class="header-buttons tbl-export-btn">
                  <li>
                    <div class="icon-button-demo">
                      <button mat-mini-fab color="primary" (click)="addNew()">
                        <mat-icon class="col-white">add</mat-icon>
                      </button>
                    </div>
                  </li>
                  <li>
                    <div class="icon-button-demo">
                      <button mat-mini-fab color="primary" (click)="refresh()">
                        <mat-icon class="col-white">refresh
                        </mat-icon>
                      </button>
                    </div>
                  </li>
                </ul>
              </div>
            </div>
          </div>

          @if (expandedElement !== undefined) {
            <div>
              {{ expandedElement.id }}
            </div>
          }
          <mat-table #table [dataSource]="dataSource" matSort multiTemplateDataRows class="mat-cell">
            <ng-container matColumnDef="nombre">
              <mat-header-cell *matHeaderCellDef mat-sort-header>Nombre
              </mat-header-cell>
              <mat-cell *matCellDef="let row"> {{row.nombre}}
              </mat-cell>
            </ng-container>

            <!-- actions -->
            <ng-container matColumnDef="actions">
              <mat-header-cell class="pr-0" *matHeaderCellDef>Acciones
              </mat-header-cell>
              <mat-cell *matCellDef="let row; let i=index;" class="pr-0">
                <button mat-icon-button color="accent" class="btn-tbl-edit" (click)="$event.stopPropagation()"
                  (click)="editCall(row)">
                  <mat-icon aria-label="Edit" class="col-white">edit
                  </mat-icon>
                </button>

                <button mat-icon-button color="accent" class="btn-tbl-delete" (click)="$event.stopPropagation()"
                  (click)="deleteItem(row)">
                  <mat-icon aria-label="Delete" class="col-white">delete
                  </mat-icon>
                </button>
              </mat-cell>
            </ng-container>>

            <mat-header-row *matHeaderRowDef="displayedColumns">
            </mat-header-row>
            <!-- <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row> -->
            <mat-row *matRowDef="let row; columns: displayedColumns;" (click)="expandedElement = row;"
              [style.cursor]="'pointer'" matRipple class="element-row" [class.expanded]="expandedElement == row">
            </mat-row>
            <!--
                                            <mat-row *matRowDef="let row; columns: ['expandedDetail'];">
                                            </mat-row>
                                            -->
          </mat-table>

          <div class="no-results" [style.display]="dataSource.renderedData.length == 0 ? '' : 'none'">
            No results
          </div>
          <mat-paginator #paginator [length]="dataSource.filteredData.length" [pageIndex]="0" [pageSize]="10"
            [pageSizeOptions]="[5, 10, 25, 100]">
          </mat-paginator>
        </div>
      </div>
    </div>

  </div>
</section>
