<section class="content sl-dashboard-aprendices">
  <div class="container-fluid">
    <app-pagetitle [title]="pageTitle"></app-pagetitle>

    <div class="card">
      <div class="body">
        <div class="materialTableHeader sl-aprendices-toolbar">
          <div class="sl-aprendices-toolbar__search">
            <ul class="header-buttons-left ml-0">
              <li class="dropdown m-l-20">
                <label for="dashboard-aprendices-search-input">
                  <i class="material-icons search-icon">search</i>
                </label>
                <input
                  id="dashboard-aprendices-search-input"
                  class="browser-default search-field"
                  type="text"
                  [formControl]="searchField"
                  placeholder="Documento, nombre o fecha inscripción (yyyy-MM-dd)"
                  aria-label="Filtro de búsqueda de aprendices"
                  autofocus
                />
              </li>
            </ul>
          </div>
          <div class="sl-aprendices-toolbar__actions">
            <ul class="header-buttons tbl-export-btn">
              <li>
                <button mat-mini-fab color="primary" type="button" (click)="search()" matTooltip="Buscar">
                  <mat-icon class="col-white">search</mat-icon>
                </button>
              </li>
              <li>
                <button mat-mini-fab color="primary" type="button" (click)="searchInscritos()" matTooltip="Listar inscritos hoy">
                  <mat-icon class="col-white">list</mat-icon>
                </button>
              </li>
              <li *ngIf="hasAprendices()">
                <button mat-raised-button color="primary" type="button" (click)="mostrarResumen()">
                  <mat-icon>assessment</mat-icon>
                  Ver resumen
                </button>
              </li>
            </ul>
          </div>
        </div>

        @if (aprendizInscritoFindService.loading()) {
          <div class="text-center sl-aprendices-loading">
            <mat-spinner diameter="40" aria-label="Cargando"></mat-spinner>
          </div>
        } @else {
          @if (aprendizInscritoFindService.aprendizs(); as list) {
            @if (list.length > 0) {
              <app-aprendices-table [aprendices]="list"></app-aprendices-table>
            } @else {
              <div class="text-center mt-4 mb-4 text-muted">
                <p>No se encontraron resultados.</p>
              </div>
            }
          } @else {
            <div class="text-center mt-4 mb-4 text-muted">
              <p>No se encontraron resultados.</p>
            </div>
          }
        }
      </div>
    </div>
  </div>
</section>
