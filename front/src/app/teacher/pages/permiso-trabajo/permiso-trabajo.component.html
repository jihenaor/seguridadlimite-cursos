<section class="content sl-permiso-trabajo-page">
  <div class="container-fluid">
    <div class="row clearfix">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <div class="card sl-pt-card shadow-lg rounded-3xl border border-gray-100">
          <div
            class="header flex min-w-0 flex-col gap-4 border-b border-gray-200 bg-gray-50 p-4 sm:flex-row sm:items-center sm:justify-between sm:p-5">
            <div class="min-w-0 shrink">
              <h2 class="m-0 text-xl font-bold tracking-tight sm:text-2xl">
                <strong>Permisos de trabajo</strong>
              </h2>
              <p class="sl-pt-subtitle mt-1 mb-0 text-sm sm:text-base">
                Consulta y gestión de permisos de trabajo en alturas
              </p>
            </div>
            <div class="sl-pt-toolbar-actions flex min-w-0 flex-wrap items-center justify-end gap-3">
              <a
                routerLink="/teacher/evaluar"
                class="sl-tw-btn-primary inline-flex min-w-0 items-center gap-2 whitespace-nowrap rounded-3xl bg-blue-600 px-5 py-3 text-base font-semibold text-white shadow-lg shadow-blue-500/30 transition-all hover:bg-blue-700 sm:px-6 no-underline">
                <app-svg-icon name="plus" [size]="20" />
                <span>Nuevo</span>
              </a>
            </div>
          </div>

          <div class="body p-0">
            <div class="border-b border-gray-200 bg-white px-4 py-4 sm:px-5 sm:py-5">
              <app-permiso-trabajo-filtros (filtroAplicado)="aplicarFiltro($event)"></app-permiso-trabajo-filtros>
            </div>

            <app-permiso-trabajo-tabla
              [dataSource]="dataSource()"
              [cargando]="permisoService.cargando()"
              (verDetalleEvent)="verDetalle($event)"
              (editarPermisoEvent)="editarPermiso($event)"
              (eliminarPermisoEvent)="eliminarPermiso($event)">
            </app-permiso-trabajo-tabla>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
