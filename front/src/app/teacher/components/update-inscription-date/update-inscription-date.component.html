<div style="display: flex; flex-direction: column; height: 100%;">

  <mat-tab-group style="flex: 1; min-height: 0;"
                 (selectedTabChange)="onTabChange($event)">

    <!-- Tab 1: Cursos activos (solo consulta; no guarda inscripción aquí) -->
    <mat-tab label="Cursos abiertos en la fecha">
      <div style="padding: 16px; max-height: 62vh; overflow-y: auto;">
        <app-active-work-permits></app-active-work-permits>
      </div>
    </mat-tab>

    <!-- Tab 2: Apertura de inscripción -->
    <mat-tab label="Apertura de Inscripción">
      <div style="display: flex; flex-direction: column; max-height: 62vh; min-height: 0;">
        <div style="flex: 1; min-height: 0; overflow-y: auto; padding: 16px;">

        <p *ngIf="niveles.length === 0"
           style="text-align: center; color: #9e9e9e; padding: 32px 0;">
          No hay niveles disponibles
        </p>

        <!-- Tarjeta por nivel -->
        <div *ngFor="let nivel of niveles"
             style="margin-bottom: 12px; border-radius: 8px; overflow: hidden; transition: box-shadow 0.2s;"
             [style.border]="nivel.seleccionado ? '2px solid #1976d2' : '1px solid #e0e0e0'"
             [style.boxShadow]="nivel.seleccionado ? '0 2px 8px rgba(25,118,210,0.12)' : 'none'">

          <!-- Encabezado del card (clic para expandir) -->
          <div style="display: flex; align-items: center; padding: 12px 16px; cursor: pointer; user-select: none;"
               [style.backgroundColor]="nivel.seleccionado ? '#e3f2fd' : '#fafafa'"
               (click)="nivel.seleccionado = !nivel.seleccionado; onSelectionChange(nivel)">

            <mat-checkbox
              [(ngModel)]="nivel.seleccionado"
              [ngModelOptions]="{standalone: true}"
              (click)="$event.stopPropagation()"
              (change)="onSelectionChange(nivel)"
              style="margin-right: 12px;">
            </mat-checkbox>

            <span style="flex: 1; font-weight: 500; font-size: 15px; color: #212121;">
              {{ nivel.nombre }}
            </span>

            <app-svg-icon
              [name]="nivel.seleccionado ? 'chevron-up' : 'chevron-down'"
              [size]="20"
              style="color: #757575; flex-shrink: 0;" />
          </div>

          <!-- Cuerpo expandido -->
          <div *ngIf="nivel.seleccionado"
               style="padding: 16px 20px 20px; background: #fff; border-top: 1px solid #e3f2fd;">

            <!-- Fechas y número de grupos -->
            <div class="inscripcion-fechas-grid"
                 style="display: grid; grid-template-columns: 1fr 1fr 160px; gap: 16px; margin-bottom: 4px; align-items: start;">

              <ng-container *ngIf="nivelUsaRangoDesdeDias(nivel); else fechasDesdeHastaEditables">
                <app-ui-outlined-field
                  class="inscripcion-date-field"
                  label="Fecha desde"
                  fieldType="date"
                  [readOnly]="true"
                  [ngModelOptions]="{standalone: true}"
                  [ngModel]="formatYmd(nivelPickerDates[nivel.id]?.desde ?? null) ?? ''">
                </app-ui-outlined-field>

                <app-ui-outlined-field
                  class="inscripcion-date-field"
                  label="Fecha hasta"
                  fieldType="date"
                  [readOnly]="true"
                  [ngModelOptions]="{standalone: true}"
                  [ngModel]="formatYmd(nivelPickerDates[nivel.id]?.hasta ?? null) ?? ''">
                </app-ui-outlined-field>
              </ng-container>

              <ng-template #fechasDesdeHastaEditables>
                <app-ui-outlined-field
                  class="inscripcion-date-field"
                  [fieldId]="'nivel-' + nivel.id + '-desde'"
                  label="Fecha desde"
                  fieldType="date"
                  [ngModelOptions]="{standalone: true}"
                  [ngModel]="formatYmd(nivelPickerDates[nivel.id]?.desde ?? null) ?? ''"
                  (ngModelChange)="onNivelFechaYmdChange(nivel, 'fechadesde', $event)">
                </app-ui-outlined-field>

                <app-ui-outlined-field
                  class="inscripcion-date-field"
                  [fieldId]="'nivel-' + nivel.id + '-hasta'"
                  label="Fecha hasta"
                  fieldType="date"
                  [ngModelOptions]="{standalone: true}"
                  [ngModel]="formatYmd(nivelPickerDates[nivel.id]?.hasta ?? null) ?? ''"
                  (ngModelChange)="onNivelFechaYmdChange(nivel, 'fechahasta', $event)">
                </app-ui-outlined-field>
              </ng-template>

              <app-ui-outlined-field
                class="inscripcion-date-field"
                [fieldId]="'nivel-' + nivel.id + '-grupos'"
                label="# Grupos"
                fieldType="number"
                min="1"
                placeholder="Ej. 2"
                [ngModelOptions]="{standalone: true}"
                [ngModel]="nivel.numerogrupos != null ? '' + nivel.numerogrupos : ''"
                (ngModelChange)="nivel.numerogrupos = $event === '' ? undefined : +$event">
              </app-ui-outlined-field>

            </div>

            <p *ngIf="nivelUsaRangoDesdeDias(nivel)"
               style="font-size: 12px; color: #757575; margin: -2px 0 10px;">
              Fecha desde y hasta se calculan automáticamente (mínimo y máximo de los días de diseño curricular).
            </p>

            <!-- Días de diseño curricular -->
            <div *ngIf="nivel.diasdiseno && nivel.diasdiseno.length > 0"
                 style="margin-top: 8px;">

              <p style="font-size: 11px; font-weight: 600; text-transform: uppercase;
                         letter-spacing: 0.05em; color: #757575; margin-bottom: 10px;">
                Fechas por día de diseño curricular
              </p>

              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div *ngFor="let dia of nivel.diasdiseno"
                     style="display: flex; align-items: center; gap: 12px;
                            background: #f5f5f5; border-radius: 6px; padding: 8px 12px;">

                  <!-- Día + tipo (T teórico / P práctico) + unidad -->
                  <div class="dia-diseno-label">
                    <div class="dia-diseno-label__row">
                      <span class="dia-diseno-label__num">Día {{ dia.dia }}</span>
                      <span
                        class="dia-contexto-chip"
                        [class.dia-contexto-chip--teorico]="esContextoTeorico(dia)"
                        [class.dia-contexto-chip--practico]="esContextoPractico(dia)"
                        [class.dia-contexto-chip--otro]="!esContextoTeorico(dia) && !esContextoPractico(dia)"
                        [attr.title]="esContextoTeorico(dia) ? 'Formación teórica' : (esContextoPractico(dia) ? 'Formación práctica' : null)">
                        <app-svg-icon *ngIf="esContextoTeorico(dia)" name="book-open" [size]="14" />
                        <app-svg-icon *ngIf="esContextoPractico(dia)" name="wrench" [size]="14" />
                        <span>{{ etiquetaContextoDia(dia) }}</span>
                      </span>
                    </div>
                    <div class="dia-diseno-label__unidad"
                         [title]="dia.unidad">
                      {{ dia.unidad }}
                    </div>
                  </div>

                  <app-ui-outlined-field
                    class="inscripcion-dia-date"
                    [fieldId]="'dia-' + nivel.id + '-' + dia.dia"
                    label="Fecha"
                    fieldType="date"
                    [ngModelOptions]="{standalone: true}"
                    [ngModel]="formatYmd(diaPickerDates[diaPickerKey(nivel.id, dia.dia)] ?? null) ?? ''"
                    (ngModelChange)="onDiaFechaYmdChange(nivel, dia, $event)">
                  </app-ui-outlined-field>

                </div>
              </div>
            </div>

          </div>
        </div>

        </div>

        <!-- Acciones fijas al pie solo en esta pestaña -->
        <div style="flex-shrink: 0; display: flex; justify-content: flex-end; gap: 12px;
                    padding: 14px 20px; border-top: 1px solid #e0e0e0; background: #fff;">
          <button mat-button type="button" (click)="dialogRef.close()">Cancelar</button>
          <button mat-raised-button color="primary" type="button"
                  [disabled]="!canSaveInscripcion()"
                  (click)="startWorkPermissions()">
            <span class="inscripcion-btn-save">
              <app-svg-icon name="save" [size]="18" />
              Guardar inscripción
            </span>
          </button>
        </div>
      </div>
    </mat-tab>
  </mat-tab-group>

  <!-- Cerrar desde la pestaña de solo lectura -->
  <div *ngIf="selectedTabIndex === 0"
       style="display: flex; justify-content: flex-end; gap: 12px;
              padding: 14px 20px; border-top: 1px solid #e0e0e0; background: #fff;">
    <button mat-button type="button" (click)="dialogRef.close()">Cerrar</button>
  </div>

</div>
