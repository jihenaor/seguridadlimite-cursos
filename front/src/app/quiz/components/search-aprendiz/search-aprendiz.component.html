<div class="quiz-search-identidad">
  @if (nombreSesion || documentoSesion) {
    <div
      class="quiz-search-identidad__banner px-3 py-2 rounded-md border border-blue-200 bg-blue-50 text-sm text-slate-800"
      role="status"
    >
      <span class="text-slate-600">Aprendiz:</span>
      @if (nombreSesion) {
        <span class="font-semibold text-slate-900 ms-1">{{ nombreSesion }}</span>
      }
      @if (documentoSesion) {
        <span class="text-slate-600">
          @if (nombreSesion) {
            <span> · </span>
          }
          Documento: <span class="font-medium text-slate-900">{{ documentoSesion }}</span>
        </span>
      }
    </div>
  }
</div>
