# ══════════════════════════════════════════════════════════════
#  docker-compose.yml — Stack de producción
#  Seguridad Al Límite
#
#  Servicios:
#    mysql       → Base de datos MySQL 8
#    phpmyadmin  → Consola web MySQL
#    backend     → API Spring Boot  (imagen desde GHCR)
#    frontend    → App Angular      (imagen desde GHCR)
#    gateway     → Nginx reverse proxy
#    backup      → Backup automático semanal
#
#  Uso en el servidor VPS:
#    cp .env.example .env && nano .env
#    docker compose up -d
# ══════════════════════════════════════════════════════════════

services:

  # ────────────────────────────────────────────────────────────
  #  Base de datos MySQL 8
  # ────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: seguridad-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    command: >
      mysqld
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────
  #  phpMyAdmin
  # ────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: seguridad-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ARBITRARY: "0"
    ports:
      - "8180:80"
    networks:
      - backend_net

  # ────────────────────────────────────────────────────────────
  #  Backend — Spring Boot API
  # ────────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/${GITHUB_ORG}/seguridad-backend:${BACKEND_TAG:-latest}
    container_name: seguridad-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-30}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      DEPLOY_SECRET_TOKEN: ${DEPLOY_SECRET_TOKEN}
    volumes:
      - backend_logs:/app/logs
    expose:
      - "8090"
    networks:
      - backend_net
      - gateway_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --server-response http://127.0.0.1:8090/cursosback/ 2>&1 | grep -qE 'HTTP/|401|403|200|302' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ────────────────────────────────────────────────────────────
  #  Frontend — Angular App (Nginx)
  # ────────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/${GITHUB_ORG}/seguridad-frontend:${FRONTEND_TAG:-latest}
    container_name: seguridad-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - gateway_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ────────────────────────────────────────────────────────────
  #  Gateway — Nginx Reverse Proxy
  # ────────────────────────────────────────────────────────────
  gateway:
    image: nginx:1.27-alpine
    container_name: seguridad-gateway
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "8090:80"
      - "9443:443"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - gateway_net

  # ────────────────────────────────────────────────────────────
  #  Backup automático semanal (domingo 2:00 AM)
  # ────────────────────────────────────────────────────────────
  backup:
    image: alpine:3.19
    container_name: seguridad-backup
    volumes:
      - ./backup:/scripts:ro
      - backup_data:/backups
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: mysql
    entrypoint: >
      /bin/sh -c "apk add --no-cache docker-cli mysql-client tzdata && \
      cp /usr/share/zoneinfo/America/Mexico_City /etc/localtime && \
      echo '0 2 * * 0 /bin/sh /scripts/backup.sh' | crontab - && \
      crond -f -l 2"
    networks:
      - backend_net

networks:
  backend_net:
    driver: bridge
  gateway_net:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  backend_logs:
    driver: local
  backup_data:
    driver: local