# ══════════════════════════════════════════════════════════════
#  gateway-local.conf — Nginx para DESARROLLO LOCAL (sin TLS)
#
#  Enrutamiento:
#    /api/**           → backend:8090/cursosback/api/**
#    /cursosback/auth/ → backend:8090/cursosback/auth/**
#    /*                → frontend:80  (Angular SPA)
#
#  Accesos:
#    http://localhost       → App completa
#    http://localhost/api/  → API Backend
#    http://localhost:8090  → Backend directo (Postman/debug)
#    http://localhost:8080  → phpMyAdmin
# ══════════════════════════════════════════════════════════════

upstream backend_service {
    server backend:8090;
    keepalive 8;
}

upstream frontend_service {
    server frontend:80;
    keepalive 8;
}

server {
    listen 80;
    server_name localhost;
    server_tokens off;

    client_max_body_size 200M;
    proxy_read_timeout    120s;
    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;

    # ── API Backend ────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend_service/cursosback/api/;
    }

    location /cursosback/auth/ {
        proxy_pass http://backend_service/cursosback/auth/;
    }

    location /cursosback/actuator/ {
        allow 127.0.0.1;
        allow 172.0.0.0/8;
        deny all;
        proxy_pass http://backend_service/cursosback/actuator/;
    }

    # ── Frontend Angular SPA ────────────────────────────────────
    location / {
        proxy_pass http://frontend_service/;
        proxy_intercept_errors on;
        error_page 404 = @frontend_fallback;
    }

    location @frontend_fallback {
        proxy_pass http://frontend_service/;
    }
}
