# ══════════════════════════════════════════════════════════════════════
#  Nginx Gateway — Seguridad Al Límite (Producción)
#
#  Enrutamiento (cursos.seguridadallimite.com):
#    /api/**, /cursos-api/**     → backend:8090/cursosback/api/**  (Angular usa /api/)
#    /cursosback/auth/**,
#    /cursos-auth/**            → backend:8090/cursosback/auth/**
#    /cursosback/actuator/**,
#    /cursos-actuator/**        → backend:8090/cursosback/actuator/**
#    /*                         → frontend:80  (SPA)
#
#  Otros hosts:
#    seguridadallimite.com      → landing:80  (servicio «landing» en compose del VPS)
#    phpmyadmin.*               → phpmyadmin:80  (nombre de servicio Docker Compose)
#    api.seguridadallimite.com,
#    api.seguridadlimite.com    → api-legacy:8000  (Gunicorn; debe estar en gateway_net)
#
#  Seguridad:
#    - HTTP → HTTPS (301)
#    - HSTS, CSP, X-Frame-Options, X-Content-Type-Options
#
#  Nota: no usar «default_server» en el bloque api.* salvo que quieras capturar
#  todo HTTPS con SNI desconocido (rompe otros subdominios / certificados).
# ══════════════════════════════════════════════════════════════════════

upstream frontend_service {
    server frontend:80;
    keepalive 16;
}

limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# ── Bloque 1: HTTP → HTTPS ────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name cursos.seguridadallimite.com seguridadallimite.com www.seguridadallimite.com phpmyadmin.seguridadallimite.com api.seguridadallimite.com api.seguridadlimite.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Bloque 2: HTTPS cursos.seguridadallimite.com ───────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cursos.seguridadallimite.com;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/cursos.seguridadallimite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cursos.seguridadallimite.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 200M;
    proxy_read_timeout    120s;
    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    resolver 127.0.0.11 valid=10s ipv6=off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://cursos.seguridadallimite.com; frame-ancestors 'none';"
        always;

    # ── API Spring (cursos) ─────────────────────────────────────────
    # Angular (environment.prod.ts) usa https://…/api/… — sin /api/ el POST cae en el SPA → 405.
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend:8090/cursosback/api/;
    }

    location /cursos-api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend:8090/cursosback/api/;
    }

    location /cursosback/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://backend:8090/cursosback/auth/;
    }

    location /cursos-auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://backend:8090/cursosback/auth/;
    }

    location /cursosback/actuator/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://backend:8090/cursosback/actuator/;
    }

    location /cursos-actuator/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://backend:8090/cursosback/actuator/;
    }

    # ── Frontend Angular SPA ───────────────────────────────────────
    location / {
        proxy_pass http://frontend:80;
    }
}

# ── Bloque 3: HTTPS seguridadallimite.com (landing) ───────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name seguridadallimite.com www.seguridadallimite.com;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/cursos.seguridadallimite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cursos.seguridadallimite.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 200M;
    proxy_read_timeout    120s;
    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Resolver + variable: el gateway puede arrancar aunque «landing» no exista aún.
    location / {
        set $landing_upstream landing;
        proxy_pass http://$landing_upstream:80;
    }
}

# ── Bloque 4: HTTPS phpmyadmin.seguridadallimite.com ───────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name phpmyadmin.seguridadallimite.com;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/cursos.seguridadallimite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cursos.seguridadallimite.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        proxy_pass http://phpmyadmin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Bloque 5: HTTPS API legacy (Gunicorn) ─────────────────────────────
#  Requiere contenedor/servicio «api-legacy» en la misma red Docker que «gateway».
#  Sin default_server: solo responde cuando el SNI coincide con estos server_name.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.seguridadallimite.com api.seguridadlimite.com;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/cursos.seguridadallimite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cursos.seguridadallimite.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 200M;
    proxy_read_timeout    120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Resolver + variable: el reload de nginx no exige que el host exista en arranque (resolución en petición).
    location / {
        set $api_legacy_upstream api-legacy;
        proxy_pass http://$api_legacy_upstream:8000/;
    }
}
