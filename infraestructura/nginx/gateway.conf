# ══════════════════════════════════════════════════════════════════════
#  Nginx Gateway — Seguridad Al Límite (Producción)
#
#  Enrutamiento:
#    cursos.seguridadallimite.com → frontend:80  (Angular SPA)
#    seguridadallimite.com         → landing page (contenedor separado)
#    /api/**                       → backend:8090/cursosback/api/**  (el cliente NO debe anteponer /cursosback)
#    /cursosback/auth/**          → backend:8090/cursosback/auth/**
#
#  Seguridad:
#    - HTTP → HTTPS redireccionado (301)
#    - HSTS, CSP, X-Frame-Options, X-Content-Type-Options
# ══════════════════════════════════════════════════════════════════════

upstream frontend_service {
    server frontend:80;
    keepalive 16;
}

limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# ── Bloque 1: HTTP → HTTPS ────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name cursos.seguridadallimite.com seguridadallimite.com www.seguridadallimite.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Bloque 2: HTTPS cursos.seguridadallimite.com ───────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cursos.seguridadallimite.com;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/cursos.seguridadallimite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cursos.seguridadallimite.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 200M;
    proxy_read_timeout    120s;
    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # DNS embebido de Docker (solo dentro del contenedor gateway)
    resolver 127.0.0.11 valid=10s ipv6=off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://cursos.seguridadallimite.com; frame-ancestors 'none';"
        always;

    # ── API Backend ────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        set $backend_host backend;
        proxy_pass http://$backend_host:8090/cursosback/api/;
    }

    location /cursosback/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        set $backend_host backend;
        proxy_pass http://$backend_host:8090/cursosback/auth/;
    }

    location /cursosback/actuator/ {
        allow 127.0.0.1;
        deny all;
        set $backend_host backend;
        proxy_pass http://$backend_host:8090/cursosback/actuator/;
    }

    # ── Frontend Angular SPA ───────────────────────────────────────
    location / {
        proxy_pass http://frontend:80;
    }
}

# ── Bloque 3: HTTPS seguridadallimite.com (Landing Page) ─────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name seguridadallimite.com www.seguridadallimite.com;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/cursos.seguridadallimite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cursos.seguridadallimite.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 200M;
    proxy_read_timeout    120s;
    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    location / {
        proxy_pass http://heuristic_robinson:80;
    }
}